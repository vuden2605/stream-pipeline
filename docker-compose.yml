services:
  queue-feeder:
    build: .
    image: smart-transport-ai:latest
    container_name: ai-queue-feeder
    command: python -u queue_feeder.py
    env_file: .env.prod
    restart: unless-stopped

  worker:
    build: .
    image: smart-transport-ai:latest
    container_name: ai-worker
    command: bash -c "python -u worker.py 2>&1 | grep -v NNPACK"
    env_file: .env.prod
    restart: unless-stopped
    depends_on:
      - queue-feeder

  # Pipeline tách biệt hoàn toàn khỏi queue-feeder/worker ở trên — tự fetch
  # camera theo chu kỳ riêng, không dùng chung camera_queue hay Redis key nào
  # của traffic pipeline (xem accident_worker.py).
  accident-worker:
    build: .
    image: smart-transport-ai:latest
    container_name: ai-accident-worker
    command: bash -c "python -u accident_worker.py 2>&1 | grep -v NNPACK"
    env_file: .env.prod
    restart: unless-stopped

  # API + trang admin duyệt sự kiện tai nạn — image riêng, nhẹ (không cần
  # torch/ultralytics), chỉ đọc/ghi Redis key accident:* do accident-worker tạo.
  accident-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: smart-transport-accident-api:latest
    container_name: ai-accident-api
    ports:
      - "8080:8000"
    env_file: .env.prod
    restart: unless-stopped
